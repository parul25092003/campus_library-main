<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Digital BCA Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-100 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-purple-100 rounded-full blur-[120px]"></div>
    </div>

    <div class="glass-card w-full max-w-md p-10 rounded-[32px] shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900">Welcome Back</h1>
            <p class="text-slate-500 mt-2">Sign in to access your BCA resources</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">College Email</label>
                <input type="email" id="email" required placeholder="name@college.edu" 
                    class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <button type="submit" 
                class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 hover:-translate-y-1 transition-all">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-500">
            Don't have an account? <a href="#" class="text-blue-600 font-bold hover:underline">Register here</a>
        </div>
        
        <div class="mt-8 text-center">
            <a href="javascript:history.back()" class="text-slate-400 hover:text-slate-600 text-xs uppercase tracking-widest font-bold transition-colors">
                ← Go Back
            </a>
        </div>
    </div>

    <script>
       document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        // Calling your Node.js Backend
        const response = await fetch('http://localhost:5000/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            // 1. Set the session flags
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);

            // 2. Find out where they came from
            const destination = localStorage.getItem('redirectAfterLogin') || "index.html";
            
            // 3. Clean up the redirect memory
            localStorage.removeItem('redirectAfterLogin');

            // 4. Redirect them back to the page they clicked!
            window.location.href = destination;
        } else {
            alert("Login failed. Check your backend console!");
        }
    } catch (err) {
        alert("Backend is offline! Run 'npm run dev' in VS Code.");
    }
});
    </script>
</body>
</html>
